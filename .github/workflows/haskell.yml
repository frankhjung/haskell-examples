---
name: haskell examples

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - "**"
# yamllint enable

concurrency:
  group: haskell-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  STACK_ROOT: ${{ github.workspace }}/.stack-work

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STACK_ROOT }}
          key: ${{ github.ref }}

      - name: check
        run: cabal check

      - name: build
        run: |
          stack clean
          touch -d "2023-11-22T04:27:27UTC" LICENSE
          stack test --pedantic --no-run-benchmarks

      - name: haddock
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        run: |
          stack haddock --haddock-hyperlink-source
          mv $(stack path --local-doc-root)/ public/

      - name: artifacts
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
